syntax = "proto3";

package robomaster;

// ============================================================
// 2.2.1 KeyboardMouseControl
// 用途：传输鼠标键盘输入（通过图传链路发给机器人）
// ============================================================
message KeyboardMouseControl {
    int32 mouse_x_velocity = 1;       // 鼠标X轴移动速度（负值向左）
    int32 mouse_y_velocity = 2;       // 鼠标Y轴移动速度（负值向下）
    int32 mouse_wheel_velocity = 3;   // 鼠标滚轮移动速度（负值向后滚动）
    bool left_button_pressed = 4;     // 左键是否按下（false=抬起，true=按下）
    bool right_button_pressed = 5;    // 右键是否按下
    uint32 key_mask = 6;              // 键盘按键位掩码（bit0~15对应W/S/A/D/Shift/Ctrl/Q/E/R/F/G/Z/X/C/V/B）
    bool middle_button_pressed = 7;   // 中键是否按下
}

// ============================================================
// 2.2.2 CustomControl
// 用途：最大300字节的自定义数据（通过0x0311发给机器人）
// ============================================================
message CustomControl {
    bytes data = 1;                   // 最大300字节自定义数据
}

// ============================================================
// 2.2.3 GameStatus
// 用途：同步比赛全局状态信息（服务器→客户端）
// ============================================================
message GameStatus {
    uint32 current_round = 1;         // 当前局号（从1开始）
    uint32 total_rounds = 2;          // 总局数
    uint32 red_score = 3;             // 红方得分
    uint32 blue_score = 4;            // 蓝方得分
    uint32 current_stage = 5;         // 当前阶段（0:未开始,1:准备,2:自检,3:倒计时,4:比赛中,5:结算中）
    int32 stage_countdown_sec = 6;    // 当前阶段剩余时间（秒）
    int32 stage_elapsed_sec = 7;      // 当前阶段已过时间（秒）
    bool is_paused = 8;               // 是否暂停
    uint32 winner = 9;                // 当局胜者（0:平局,1:红方,2:蓝方），仅结算中有意义，其余255
    uint32 end_reason = 10;           // 比赛结束原因（1:基地摧毁,2:基地血量,3:前哨站血量,4:前哨站击毁,5:总伤害,6:总血量,7:平局,8:异常,9:主裁判）
}

// ============================================================
// 2.2.4 GlobalUnitStatus
// 用途：同步基地、前哨站和所有机器人状态
// ============================================================
message GlobalUnitStatus {
    uint32 base_health = 1;           // 己方基地当前血量（0=已摧毁）
    uint32 base_status = 2;           // 0:无敌,1:解除无敌护甲未展开,2:解除无敌护甲展开
    uint32 base_shield = 3;           // 己方基地当前护盾值（0=无护盾）
    uint32 outpost_health = 4;        // 己方前哨站当前血量（0=已摧毁）
    uint32 outpost_status = 5;        // 0:无敌,1:存活解除无敌装甲旋转,2:存活装甲停转,3:被击毁不可重建,4:被击毁可重建,5:重建中
    uint32 enemy_base_health = 6;     // 对方基地当前血量
    uint32 enemy_base_status = 7;     // 对方基地状态（同上）
    uint32 enemy_base_shield = 8;     // 对方基地护盾
    uint32 enemy_outpost_health = 9;  // 对方前哨站血量
    uint32 enemy_outpost_status = 10; // 对方前哨站状态
    repeated uint32 robot_health = 11; // 所有机器人血量[己方1,2,3,4,7, 对方1,2,3,4,7]（按序）
    repeated int32 robot_bullets = 12; // 己方机器人剩余累计发弹量（按序）
    uint32 total_damage_ally = 13;    // 己方累计总伤害
    uint32 total_damage_enemy = 14;   // 对方累计总伤害
}

// ============================================================
// 2.2.5 GlobalLogisticsStatus
// 用途：同步全局后勤信息
// ============================================================
message GlobalLogisticsStatus {
    uint32 remaining_economy = 1;     // 己方当前经济（剩余金币）
    uint64 total_economy_obtained = 2;// 己方累计总经济
    uint32 tech_level = 3;            // 己方科技等级（工程机器人曾装配最高难度）
    uint32 encryption_level = 4;      // 己方加密等级（雷达解析信息波机制，1~3）
}

// ============================================================
// 2.2.6 GlobalSpecialMechanism
// 用途：同步正在生效的全局特殊机制
// ============================================================
message GlobalSpecialMechanism {
    repeated uint32 mechanism_id = 1;   // 机制ID列表（1:己方堡垒被对方占领计时,2:对方堡垒被己方占领计时）
    repeated int32 mechanism_time_sec = 2; // 对应的时间参数（秒）
}

// ============================================================
// 2.2.7 Event
// 用途：全局事件通知
// ============================================================
message Event {
    int32 event_id = 1;               // 事件编号（1:击杀,2:前哨站被摧毁,3:大能量机关激活,4:能量机关进入已激活,5:己方英雄狙击伤害,6:对方英雄狙击伤害,7:对方呼叫空中支援,8:空中支援被反制,9:飞镖命中,10:对方飞镖闸门开启,11:基地遭攻击,12:对方前哨站停转,13:对方基地护甲展开,14:装配强制退出缓冲期,15:装配结果）
    string param = 2;                 // 事件参数（含义随event_id变化，如“被击杀者,击杀者”）
}

// ============================================================
// 2.2.8 RobotInjuryStat
// 用途：机器人一次存活期间累计受伤统计
// ============================================================
message RobotInjuryStat {
    uint32 total_damage = 1;          // 该次存活累计受伤总计
    uint32 collision_damage = 2;      // 撞击伤害
    uint32 small_projectile_damage = 3; // 17mm弹丸伤害
    uint32 large_projectile_damage = 4; // 42mm弹丸伤害
    uint32 dart_splash_damage = 5;    // 飞镖溅射伤害
    uint32 module_offline_damage = 6; // 模块离线扣血
    uint32 offline_damage = 7;        // 异常离线扣血
    uint32 penalty_damage = 8;        // 判罚扣血
    uint32 server_kill_damage = 9;    // 服务器强制使其战亡扣血
    uint32 killer_id = 10;            // 击杀者ID（0=未检测到）
}

// ============================================================
// 2.2.9 RobotRespawnStatus
// 用途：机器人复活状态同步
// ============================================================
message RobotRespawnStatus {
    bool is_pending_respawn = 1;      // 是否处于待复活状态
    uint32 total_respawn_progress = 2;// 复活所需总读条（单位？）
    uint32 current_respawn_progress = 3; // 当前复活读条进度
    bool can_free_respawn = 4;        // 是否可以免费复活
    uint32 cost_coins_respawn = 5;    // 花费金币复活所需金币数
    bool allow_cost_respawn = 6;      // 是否允许花费金币复活
}

// ============================================================
// 2.2.10 RobotStaticStatus
// 用途：机器人固定属性和配置
// ============================================================
message RobotStaticStatus {
    uint32 connection_state = 1;      // 0=未连接,1=已连接
    uint32 field_state = 2;           // 0=已上场,1=未上场
    uint32 alive_state = 3;           // 0=未知,1=存活,2=战亡
    uint32 robot_id = 4;              // 机器人编号（1,2,3,4,6,7等）
    uint32 robot_type = 5;            // 机器人类型（英雄/工程/步兵/空中/哨兵等，见附录）
    uint32 performance_system_shooter = 6; // 发射机构性能体系（1:冷却优先,2:爆发优先,3:英雄近战,4:英雄远程）
    uint32 performance_system_chassis = 7; // 底盘性能体系（1:血量优先,2:功率优先,3:英雄近战,4:英雄远程）
    uint32 level = 8;                 // 当前等级
    uint32 max_health = 9;            // 最大血量
    uint32 max_heat = 10;             // 最大热量
    float heat_cooldown_rate = 11;    // 热量冷却速率（每秒）
    uint32 max_power = 12;            // 最大功率
    uint32 max_buffer_energy = 13;    // 最大缓冲能量
    uint32 max_chassis_energy = 14;   // 最大底盘能量
}

// ============================================================
// 2.2.11 RobotDynamicStatus
// 用途：机器人实时数据
// ============================================================
message RobotDynamicStatus {
    uint32 current_health = 1;          // 当前血量
    float current_heat = 2;             // 当前热量
    float last_projectile_fire_rate = 3;// 上一次弹丸射速（Hz）
    uint32 current_chassis_energy = 4;  // 当前剩余底盘能量
    uint32 current_buffer_energy = 5;   // 当前缓冲能量
    uint32 current_experience = 6;      // 当前经验值
    uint32 experience_for_upgrade = 7;  // 距离下一次升级仍需获得的经验
    uint32 total_projectiles_fired = 8; // 累计已发弹量
    uint32 remaining_ammo = 9;          // 剩余允许发弹量
    bool is_out_of_combat = 10;         // 是否处于脱战状态
    uint32 out_of_combat_countdown = 11;// 脱战状态倒计时（秒）
    bool can_remote_health = 12;        // 是否可以远程补血
    bool can_remote_ammo = 13;          // 是否可以远程补弹
}

// ============================================================
// 2.2.12 RobotModuleStatus
// 用途：机器人各模块运行状态（0=离线,1=在线,2=因安装不规范被视为离线）
// ============================================================
message RobotModuleStatus {
    uint32 power_manager = 1;           // 电源管理模块
    uint32 rfid = 2;                    // RFID模块
    uint32 light_strip = 3;             // 灯条模块
    uint32 small_shooter = 4;           // 17mm发射机构
    uint32 big_shooter = 5;             // 42mm发射机构
    uint32 uwb = 6;                     // 定位模块
    uint32 armor = 7;                   // 装甲模块
    uint32 video_transmission = 8;      // 图传模块
    uint32 capacitor = 9;               // 电容模块
    uint32 main_controller = 10;        // 主控状态
    uint32 laser_detection_module = 11; // 激光检测模块
}

// ============================================================
// 2.2.13 RobotPosition
// 用途：机器人空间坐标和朝向
// ============================================================
message RobotPosition {
    float x = 1;                      // 世界坐标X轴（米）
    float y = 2;                      // 世界坐标Y轴（米）
    float z = 3;                      // 世界坐标Z轴（米）
    float angle = 4;                  // 测速模块朝向（度，正北为0）
    uint32 target_robot_id = 5;       // 坐标归属机器人（6/106为空中，7/107为哨兵）
}

// ============================================================
// 2.2.14 Buff
// 用途：Buff效果信息
// ============================================================
message Buff {
    uint32 robot_id = 1;              // 机器人ID
    uint32 buff_type = 2;             // 1:攻击增益,2:防御/易伤,3:热量冷却,4:底盘功率,5:回血,6:可兑换发弹量,7:地形跨越预备
    int32 buff_level = 3;             // Buff增益值（百分比或直接值，见协议说明）
    uint32 buff_max_time = 4;         // Buff最大剩余时间（秒）
    uint32 buff_left_time = 5;        // Buff剩余时间（秒）
}

// ============================================================
// 2.2.15 PenaltyInfo
// 用途：判罚信息同步
// ============================================================
message PenaltyInfo {
    uint32 penalty_type = 1;          // 1:黄牌,2:双方黄牌,3:红牌,4:超功率,5:超热量,6:超射速
    uint32 penalty_effect_sec = 2;    // 当前受罚效果时长（秒）
    uint32 penalty_count = 3;         // 当前判罚数量（累计）
}

// ============================================================
// 2.2.16 RobotPathPlanInfo
// 用途：哨兵轨迹规划信息
// ============================================================
message RobotPathPlanInfo {
    uint32 intention = 1;             // 1:攻击,2:防守,3:移动
    uint32 start_pos_x = 2;           // 起始点X坐标（分米）
    uint32 start_pos_y = 3;           // 起始点Y坐标（分米）
    repeated int32 offset_x = 4 [packed=true]; // 相对起始点X增量数组（-128~+127，长度49）
    repeated int32 offset_y = 5 [packed=true]; // 相对起始点Y增量数组（长度49）
    uint32 sender_id = 6;             // 发送者ID
}

// ============================================================
// 2.2.17 MapClickInfo
// 用途：地图点击标记信息同步（服务器→客户端）
// ============================================================
message MapClickInfo {
    uint32 send_scope = 1;            // 0:指定客户端,1:除哨兵,2:包含哨兵
    bytes target_robot_ids = 2;       // 目标机器人ID列表（固定7字节，填0补位）
    uint32 mark_mode = 3;             // 1:攻击,2:防御,3:警戒,4:自定义
    uint32 enemy_id = 4;              // 标定的对方ID
    uint32 custom_ascii = 5;          // 自定义图标ASCII码（仅mark_mode=4时有效，'C'~'L','N','O','Q'~'Z'）
    uint32 type = 6;                  // 标记模式（1=地图,2=对方机器人）
    float map_x = 7;                  // 地图坐标X
    float map_y = 8;                  // 地图坐标Y
}

// ============================================================
// 2.2.18 MapClickCmd
// 用途：地图点击标记指令（客户端→服务器）
// 字段同 MapClickInfo
// ============================================================
message MapClickCmd {
    uint32 send_scope = 1;
    bytes target_robot_ids = 2;
    uint32 mark_mode = 3;
    uint32 enemy_id = 4;
    uint32 custom_ascii = 5;
    uint32 type = 6;
    float map_x = 7;
    float map_y = 8;
}

// ============================================================
// 2.2.19 RadarInfoToClient
// 用途：雷达发送的机器人位置信息（服务器→客户端）
// 注意：该消息中 repeated 字段实际为按固定顺序排列的机器人数据，
// 但官方定义为 repeated uint32，故此处采用原始定义。
// ============================================================
message RadarInfoToClient {
    repeated uint32 radar_single_robot_info = 1; // 每个机器人三项：x(cm), y(cm), 特殊标识(0/1/2)
                                                  // 顺序：对方1,2,3,4,6,7；己方1,2,3,4,6,7
}

// ============================================================
// 2.2.20 CustomByteBlock
// 用途：自定义数据流（机器人→自定义客户端，对应0x0310）
// ============================================================
message CustomByteBlock {
    bytes data = 1;                   // 最大2.4 kbit 自定义数据
}

// ============================================================
// 2.2.21 AssemblyCommand
// 用途：工程装配指令（客户端→服务器）
// ============================================================
message AssemblyCommand {
    uint32 operation = 1;             // 0:开始兑换,1:确认装配,2:取消装配
    uint32 difficulty = 2;            // 选中的装配难度
}

// ============================================================
// 2.2.22 TechCoreMotionStateSync
// 用途：科技核心运动状态同步（服务器→客户端）
// ============================================================
message TechCoreMotionStateSync {
    uint32 maximum_difficulty_level = 1; // 当前可选择的最高装配难度等级
    uint32 basic_state = 2;              // 1:初始位置,2:运动中,3:已到达对应位姿
    uint32 putin_state = 3;              // 能量单元放入状态（0=未放入,1=已放入）
    uint32 move_state = 4;               // 能量单元平移状态（0=未平移,1=已平移）
    uint32 rotate_state = 5;             // 能量单元旋转状态（0=未旋转,1=已旋转）
    uint32 enemy_core_status = 6;        // 对方科技核心状态（0:未装配,1:非四级,2:四级）
    uint32 remain_time_all = 7;          // 己方装配总剩余时长（仅己方四级装配时有效）
    uint32 remain_time_step = 8;         // 己方单个步骤装配间隔剩余时长
}

// ============================================================
// 2.2.23 RobotPerformanceSelectionCommand
// 用途：地面机器人选择性能体系或控制方式（客户端→服务器）
// ============================================================
message RobotPerformanceSelectionCommand {
    uint32 shooter_performance = 1;   // 发射机构性能体系（同 RobotStaticStatus）
    uint32 chassis_performance = 2;   // 底盘性能体系
    uint32 sentry_control = 3;        // 哨兵控制方式（0=自动,1=半自动）
}

// ============================================================
// 2.2.24 RobotPerformanceSelectionSync
// 用途：步兵/英雄性能体系状态同步（服务器→客户端）
// ============================================================
message RobotPerformanceSelectionSync {
    uint32 shooter = 1;
    uint32 chassis = 2;
    uint32 sentry_control = 3;
}

// ============================================================
// 2.2.25 CommonCommand
// 用途：机器人多种常用指令（客户端→服务器）
// ============================================================
message CommonCommand {
    uint32 cmd_type = 1;              // 1:兑换17mm发弹量,2:兑换42mm发弹量,3:确认复活,4:兑换立即复活,
                                      // 5:远程兑换发弹量,6:远程兑换血量
    uint32 param = 2;                 // 对应参数（如发弹量数量）
}

// ============================================================
// 2.2.26 HeroDeployModeEventCommand
// 用途：英雄部署模式指令（客户端→服务器）
// ============================================================
message HeroDeployModeEventCommand {
    uint32 mode = 1;                  // 0:退出,1:进入
}

// ============================================================
// 2.2.27 DeployModeStatusSync
// 用途：英雄部署模式状态同步（服务器→客户端）
// ============================================================
message DeployModeStatusSync {
    uint32 status = 1;                // 0:未部署,1:已部署
}

// ============================================================
// 2.2.28 RuneActivateCommand
// 用途：能量机关激活指令（客户端→服务器）
// ============================================================
message RuneActivateCommand {
    uint32 activate = 1;              // 1=开启
}

// ============================================================
// 2.2.29 RuneStatusSync
// 用途：能量机关状态同步（服务器→客户端）
// ============================================================
message RuneStatusSync {
    uint32 rune_status = 1;           // 1:未激活,2:正在激活,3:已激活
    uint32 activated_arms = 2;        // 已激活灯臂数量
    float average_rings = 3;          // 平均环数
}

// ============================================================
// 2.2.30 SentryStatusSync
// 用途：哨兵姿态相关信息（服务器→客户端）
// ============================================================
message SentryStatusSync {
    uint32 posture_id = 1;            // 1:进攻姿态,2:防御姿态,3:移动姿态
    bool is_weakened = 2;             // 是否弱化
    bool is_powered = 3;              // 是否强化
}

// ============================================================
// 2.2.31 DartCommand
// 用途：飞镖控制指令（客户端→服务器）
// ============================================================
message DartCommand {
    uint32 target_id = 1;             // 1:前哨站,2:基地固定,3:基地随机固定,4:基地随机移动,5:基地末端移动
    bool open_gate = 2;               // 闸门开关（true=开）
    bool launch_confirm = 3;          // 是否确认发射（默认为false，true=确认）
}

// ============================================================
// 2.2.32 DartSelectTargetStatusSync
// 用途：飞镖目标选择状态同步（服务器→客户端）
// ============================================================
message DartSelectTargetStatusSync {
    uint32 target_id = 1;             // 目标ID（同上）
    uint32 gate_status = 2;           // 0:关闭,1:开启中,2:已开启
}

// ============================================================
// 2.2.33 SentryCtrlCommand
// 用途：哨兵控制指令请求（客户端→服务器）
// ============================================================
message SentryCtrlCommand {
    uint32 command_id = 1;            // 1:补血点补弹,3:远程补弹,4:远程回血,5:确认复活,6:确认花费金币复活,
                                      // 7:进攻姿态,8:防御姿态,9:移动姿态,10:强化进攻,11:强化防御,12:强化移动
}

// ============================================================
// 2.2.34 SentryCtrlResult
// 用途：哨兵控制指令结果反馈（服务器→客户端）
// ============================================================
message SentryCtrlResult {
    uint32 command_id = 1;            // 对应的指令编号
    uint32 result_code = 2;           // 0:成功,其他:失败
}

// ============================================================
// 2.2.35 AirSupportCommand
// 用途：空中支援指令（客户端→服务器）
// ============================================================
message AirSupportCommand {
    uint32 command_id = 1;            // 0:取消空中支援,1:免费呼叫,2:花费金币呼叫,3:花费金币解除反制
}

// ============================================================
// 2.2.36 AirSupportStatusSync
// 用途：空中支援状态反馈（服务器→客户端）
// ============================================================
message AirSupportStatusSync {
    uint32 airsupport_status = 1;     // 0:未进行,1:正在空中支援
    uint32 free_time_left = 2;        // 免费空中支援剩余时间（秒）
    uint32 cost_coins = 3;            // 付费空中支援已花费金币
    uint32 is_being_targeted = 4;     // 是否正在被激光照射（0=否,1=是）
    uint32 shooter_status = 5;        // 0:被反制锁定不可解除,1:正常,2:被锁定可花费金币解除
}